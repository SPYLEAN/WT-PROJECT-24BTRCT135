<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Tech Store | Premium Gadgets</title>
    
    <style>
        /* --- EXTERNAL STYLE SIMULATION (Global Theme) --- */
        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #0f172a; /* Deep Navy Night */
            color: white;
            scroll-behavior: smooth;
        }

        /* STICKY HEADER */
        .header-wrapper {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 210, 255, 0.3);
        }

        .banner-sale {
            background: white;
            text-align: center;
            padding: 5px;
        }

        .banner-sale img {
            max-height: 80px;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.2));
        }

        nav {
            display: flex;
            justify-content: center;
            padding: 15px;
            background: #1e293b;
        }

        nav a {
            color: #94a3b8;
            text-decoration: none;
            margin: 0 20px;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
        }

        nav a:hover { color: #00d2ff; }

        /* --- INTERNAL STYLE (Form & Grid UI) --- */
        .container {
            max-width: 1200px;
            margin: auto;
            padding: 40px 20px;
        }

        /* FORM BOX (Glassmorphism) */
        .auth-card {
            max-width: 400px;
            margin: 40px auto;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .tabs {
            display: flex;
            margin-bottom: 25px;
            gap: 10px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
            border-radius: 10px;
            font-weight: bold;
        }

        .tab-btn.active {
            background: #00d2ff;
            color: #0f172a;
            border: none;
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #94a3b8; font-size: 14px; }
        
        input {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: #00d2ff; }

        .error-text {
            color: #ff4d4d;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        /* PRODUCT GRID */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .card:hover { border-color: #00d2ff; transform: translateY(-5px); }
        .card img { width: 100%; height: 200px; object-fit: contain; }

        /* INLINE STYLE REPLACEMENT (Buttons) */
        .btn-action {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <div class="header-wrapper">
        <div class="banner-sale">
            <img src="sale.png" alt="Flash Sale 50% Off">
        </div>
        
        <header style="padding: 20px; text-align: center;">
            <h1 style="margin:0; letter-spacing: 4px; color: #00d2ff;">AURA</h1>
        </header>

        <nav>
            <a href="#products">Store</a>
            <a href="#auth-section">Account</a>
            <a href="#">Support</a>
        </nav>
    </div>

    <div class="container">
        
        <section id="auth-section" class="auth-card">
            <div class="tabs">
                <button id="loginTab" class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button id="regTab" class="tab-btn" onclick="switchTab('register')">Register</button>
            </div>

            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="lEmail" placeholder="name@email.com">
                    <span id="lEmailError" class="error-text">Email is required!</span>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="lPass" placeholder="••••••••">
                </div >
                <button type="submit" class="btn-action" style="background: #00d2ff; color: #0f172a;">Sign In</button>
            </form>

            <form id="regForm" style="display:none;" onsubmit="return handleRegister(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="rName" placeholder="John Doe">
                    <span id="rNameError" class="error-text">Please enter your name.</span>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="rEmail" placeholder="name@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="rPass" placeholder="Min. 6 characters">
                    <span id="rPassError" class="error-text">Password too short!</span>
                </div>
                <button type="submit" class="btn-action" style="background: white; color: #0f172a;">Create Account</button>
            </form>
        </section>

        <h2 id="products" style="text-align: center; margin-top: 80px;">Featured Hardware</h2>
        <div class="product-grid">
            <article class="card">
                <img src="iphone.jpg" alt="Smartphone">
                <h3>Aura Phone 1.0</h3>
                <p style="color: #00d2ff; font-size: 20px;">$999</p>
                <button class="btn-action" style="border: 1px solid #00d2ff; background: transparent; color: #00d2ff;">Add to Cart</button>
            </article>

            <article class="card">
                <img src="laptop.jpg" alt="Laptop">
                <h3>Aura Book Pro</h3>
                <p style="color: #00d2ff; font-size: 20px;">$1,450</p>
                <button class="btn-action" style="border: 1px solid #00d2ff; background: transparent; color: #00d2ff;">Add to Cart</button>
            </article>

            <article class="card">
                <img src="head.png" alt="Audio">
                <h3>Sonic Buds</h3>
                <p style="color: #00d2ff; font-size: 20px;">$199</p>
                <button class="btn-action" style="border: 1px solid #00d2ff; background: transparent; color: #00d2ff;">Add to Cart</button>
            </article>
        </div>
    </div>

    <footer style="padding: 60px; text-align: center; background: #0a0f1d; margin-top: 100px; opacity: 0.6;">
        <p>&copy; 2026 AURA TECHNOLOGIES | ALL-IN-ONE PROJECT</p>
    </footer>

    <script>
        // Tab Switcher
        function switchTab(mode) {
            const loginForm = document.getElementById('loginForm');
            const regForm = document.getElementById('regForm');
            const loginTab = document.getElementById('loginTab');
            const regTab = document.getElementById('regTab');

            if(mode === 'login') {
                loginForm.style.display = 'block';
                regForm.style.display = 'none';
                loginTab.classList.add('active');
                regTab.classList.remove('active');
            } else {
                loginForm.style.display = 'none';
                regForm.style.display = 'block';
                regTab.classList.add('active');
                loginTab.classList.remove('active');
            }
        }

        // Login Validation
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('lEmail').value;
            const error = document.getElementById('lEmailError');

            if(email === "") {
                error.style.display = 'block';
            } else {
                error.style.display = 'none';
                alert("Welcome back to Aura!");
            }
        }

        // Registration Validation
        function handleRegister(e) {
            e.preventDefault();
            const name = document.getElementById('rName').value;
            const pass = document.getElementById('rPass').value;
            let valid = true;

            if(name === "") {
                document.getElementById('rNameError').style.display = 'block';
                valid = false;
            }
            if(pass.length < 6) {
                document.getElementById('rPassError').style.display = 'block';
                valid = false;
            }

            if(valid) {
                alert("Account created successfully!");
            }
        }
    </script>
</body>
</html>
